# The audited container registry — the one place Cymbal images are pushed and
# pulled, replacing images scattered across personal projects.
apiVersion: artifactregistry.cnrm.cloud.google.com/v1beta1
kind: ArtifactRegistryRepository
metadata:
  name: cymbal-images
  namespace: cymbal-buildplatform
  labels:
    cymbal.dev/template: build-and-artifact
    cymbal.dev/tenant: buildplatform
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  format: "DOCKER"
  location: "us-central1"
  description: "Cymbal container images"
