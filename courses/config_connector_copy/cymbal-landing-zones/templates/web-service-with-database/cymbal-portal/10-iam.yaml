# Workload identity for the portal application, plus its scoped roles.
# cloudsql.client lets it connect through the Cloud SQL Auth Proxy;
# cloudsql.instanceUser is the login privilege for IAM database auth (the
# password-free pattern — see 20-sql.yaml and README §7.1).
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: portal-app
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  displayName: "Portal application"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: portal-app-cloudsql-client
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  memberFrom:
    serviceAccountRef:
      name: portal-app
  role: roles/cloudsql.client
  resourceRef:
    kind: Project
    external: projects/jwd-cc-s2
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: portal-app-cloudsql-instanceuser
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  memberFrom:
    serviceAccountRef:
      name: portal-app
  role: roles/cloudsql.instanceUser
  resourceRef:
    kind: Project
    external: projects/jwd-cc-s2
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: portal-app-storage-objectadmin
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  memberFrom:
    serviceAccountRef:
      name: portal-app
  role: roles/storage.objectAdmin
  resourceRef:
    kind: Project
    external: projects/jwd-cc-s2
