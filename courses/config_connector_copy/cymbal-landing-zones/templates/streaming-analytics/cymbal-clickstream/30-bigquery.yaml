# Warehouse: a dataset and the events table that lands parsed clickstream rows.
# The `events` table is the resource the day-2 update mutates in place (it adds
# a nullable utm_campaign column). See ../../../day2/.
apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryDataset
metadata:
  name: clickstream
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  # BigQuery multi-region. NOTE: location is immutable — trying to change it
  # later is the "disallowed change" the day-2 optional extension demonstrates.
  location: "US"
  friendlyName: "Clickstream events"
  description: "Raw website clickstream events"
---
apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: events
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  datasetRef:
    name: clickstream
  friendlyName: "events"
  # Day-partitioned on the event timestamp for realism.
  timePartitioning:
    type: "DAY"
    field: "event_timestamp"
  # spec.schema is a STRING containing a JSON array (not structured YAML).
  schema: |
    [
      {"name":"event_id","type":"STRING","mode":"REQUIRED"},
      {"name":"event_type","type":"STRING","mode":"REQUIRED"},
      {"name":"event_timestamp","type":"TIMESTAMP","mode":"REQUIRED"},
      {"name":"page_url","type":"STRING","mode":"NULLABLE"},
      {"name":"user_pseudo_id","type":"STRING","mode":"NULLABLE"}
    ]
