# DAY-2 UPDATE — full applyable replacement for
#   templates/streaming-analytics/cymbal-clickstream/30-bigquery.yaml
#
# Change vs. the original: a nullable `utm_campaign` column is appended to the
# events table schema. Adding a NULLABLE column is an allowed in-place patch —
# Config Connector mutates the EXISTING table; the table and its data survive.
# Apply with `kubectl apply -f day2/` (see day2/README.md).
apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryDataset
metadata:
  name: clickstream
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  location: "US"
  friendlyName: "Clickstream events"
  description: "Raw website clickstream events"
---
apiVersion: bigquery.cnrm.cloud.google.com/v1beta1
kind: BigQueryTable
metadata:
  name: events
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  datasetRef:
    name: clickstream
  friendlyName: "events"
  timePartitioning:
    type: "DAY"
    field: "event_timestamp"
  schema: |
    [
      {"name":"event_id","type":"STRING","mode":"REQUIRED"},
      {"name":"event_type","type":"STRING","mode":"REQUIRED"},
      {"name":"event_timestamp","type":"TIMESTAMP","mode":"REQUIRED"},
      {"name":"page_url","type":"STRING","mode":"NULLABLE"},
      {"name":"user_pseudo_id","type":"STRING","mode":"NULLABLE"},
      {"name":"utm_campaign","type":"STRING","mode":"NULLABLE"}
    ]
