# Build events: the CI runner publishes build-started / build-finished events
# here for downstream notifications and dashboards.
apiVersion: pubsub.cnrm.cloud.google.com/v1beta1
kind: PubSubTopic
metadata:
  name: build-events
  namespace: cymbal-buildplatform
  labels:
    cymbal.dev/template: build-and-artifact
    cymbal.dev/tenant: buildplatform
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec: {}
