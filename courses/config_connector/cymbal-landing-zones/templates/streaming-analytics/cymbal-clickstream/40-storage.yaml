# Raw archive: every ingested event is also dropped here as cold storage.
# A lifecycle rule deletes objects after 30 days. The day-2 update extends that
# to 60 days in place (see ../../../day2/). The bucket name is globally unique,
# so it is set via spec.resourceID with a project-ID token; metadata.name stays
# simple.
apiVersion: storage.cnrm.cloud.google.com/v1beta1
kind: StorageBucket
metadata:
  name: clickstream-raw
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  resourceID: "${CLICKSTREAM_PROJECT_ID}-clickstream-raw"
  location: "${REGION}"
  uniformBucketLevelAccess: true
  publicAccessPrevention: "enforced"
  lifecycleRule:
    - action:
        type: "Delete"
      condition:
        age: 30
