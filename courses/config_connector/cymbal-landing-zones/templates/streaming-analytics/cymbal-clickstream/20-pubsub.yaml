# Ingestion transport: a topic for raw website events and a subscription a
# downstream loader would pull from. (No real producer/consumer in this lab.)
apiVersion: pubsub.cnrm.cloud.google.com/v1beta1
kind: PubSubTopic
metadata:
  name: clickstream-events
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  messageRetentionDuration: "86400s"
---
apiVersion: pubsub.cnrm.cloud.google.com/v1beta1
kind: PubSubSubscription
metadata:
  name: clickstream-events-sub
  namespace: cymbal-clickstream
  labels:
    cymbal.dev/template: streaming-analytics
    cymbal.dev/tenant: clickstream
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  topicRef:
    name: clickstream-events
  ackDeadlineSeconds: 20
  messageRetentionDuration: "86400s"
