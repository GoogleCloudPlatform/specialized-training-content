# The portal's database: a Cloud SQL Postgres instance, a database, and an IAM
# service-account user. No password is ever generated, stored, or committed —
# the portal-app service account authenticates by identity (IAM database auth,
# enabled by the cloudsql.iam_authentication flag below).
#
# NOTE: SQLInstance takes ~5-10 minutes to go Ready. Pace the lab around it —
# this is an honest illustration of eventual consistency. Apply the other
# templates while it provisions.
#
# Alternative (faster/cheaper) for iteration: MySQL 8.0 with
#   databaseVersion: MYSQL_8_0   /   settings.tier: db-f1-micro
# We default to Postgres here.
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLInstance
metadata:
  name: portal-db
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  databaseVersion: "POSTGRES_15"
  region: "${REGION}"
  settings:
    tier: "db-custom-1-3840"
    availabilityType: "ZONAL"
    # No deletion protection — teardown and iteration are never blocked.
    deletionProtectionEnabled: false
    backupConfiguration:
      enabled: false
    # IAM database authentication: lets the portal-app SA log in by identity,
    # so no DB password is needed anywhere.
    databaseFlags:
      - name: "cloudsql.iam_authentication"
        value: "on"
---
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLDatabase
metadata:
  name: portal
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  instanceRef:
    name: portal-db
---
# IAM service-account database user. spec.type marks it as an IAM SA user, so
# spec.password is intentionally absent. For a Cloud SQL IAM SA user the
# username is the SA email WITH the ".gserviceaccount.com" suffix stripped,
# i.e. "portal-app@<project>.iam" — set here via spec.resourceID.
apiVersion: sql.cnrm.cloud.google.com/v1beta1
kind: SQLUser
metadata:
  name: portal-app
  namespace: cymbal-portal
  labels:
    cymbal.dev/template: web-service-with-database
    cymbal.dev/tenant: portal
  annotations:
    cnrm.cloud.google.com/reconcile-interval-in-seconds: "60"
spec:
  instanceRef:
    name: portal-db
  type: "CLOUD_IAM_SERVICE_ACCOUNT"
  resourceID: "portal-app@${PORTAL_PROJECT_ID}.iam"
