<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Service (FastAPI)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        h1 {
            color: #333;
            font-size: 2rem;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 0.95rem;
        }

        .hidden {
            display: none;
        }

        #auth-section {
            text-align: center;
            padding: 20px 0;
        }

        #auth-section p {
            color: #555;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .g_id_signin {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        #welcome-msg {
            background: #f0f7ff;
            padding: 15px 20px;
            border-radius: 8px;
            color: #2563eb;
            margin-bottom: 25px;
            border-left: 4px solid #2563eb;
            font-weight: 500;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #msg-input {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        #msg-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            padding: 14px 28px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        #response-area {
            margin-top: 20px;
            padding: 20px;
            background: #f9fafb;
            border-radius: 8px;
            border: 2px solid #e5e7eb;
            min-height: 100px;
            color: #374151;
            line-height: 1.6;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 0.95rem;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .response-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #6b7280;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🔊 Echo Service</h1>
        <p class="subtitle">FastAPI with OAuth 2.0 Authentication</p>

        <div id="auth-section">
            <p>Please sign in with Google to use the echo service</p>
            <div id="g_id_onload" data-client_id="{{ client_id }}"
                data-callback="handleCredentialResponse" data-auto_prompt="false">
            </div>
            <div class="g_id_signin" data-type="standard" data-size="large" data-theme="outline" data-text="signin_with" data-shape="rectangular" data-logo_alignment="left"></div>
        </div>

        <div id="app-section" class="hidden">
            <p id="welcome-msg"></p>
            <div class="input-group">
                <input type="text" id="msg-input" placeholder="Type your message here..." onkeypress="handleKeyPress(event)">
                <button class="send-btn" onclick="sendEcho()">Send</button>
            </div>
            <div class="response-label">Response:</div>
            <div id="response-area">Waiting for message...</div>
        </div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <script>
        let USER_ID_TOKEN = null;

        const API_URL = "{{ api_url }}";

        // Callback function triggered after successful Google Login
        function handleCredentialResponse(response) {
            console.log("Encoded JWT ID token: " + response.credential);
            USER_ID_TOKEN = response.credential;

            // Decode token just to show user email (optional UI step)
            const payload = JSON.parse(atob(response.credential.split('.')[1]));

            document.getElementById("auth-section").classList.add("hidden");
            document.getElementById("app-section").classList.remove("hidden");
            document.getElementById("welcome-msg").innerText = "✓ Logged in as: " + payload.email;
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendEcho();
            }
        }

        async function sendEcho() {
            const msg = document.getElementById("msg-input").value;
            const output = document.getElementById("response-area");

            if (!msg.trim()) {
                output.innerText = "Please enter a message first.";
                return;
            }

            output.innerText = "Sending...";

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        // CRITICAL: Send the ID token here
                        "Authorization": "Bearer " + USER_ID_TOKEN
                    },
                    body: JSON.stringify({ message: msg })
                });

                if (res.status === 401) {
                    output.innerText = "❌ Error: Unauthorized (401). Token invalid or expired.";
                    return;
                }

                const data = await res.json();
                output.innerText = data.echo || data.error;

            } catch (err) {
                console.error(err);
                output.innerText = "❌ Network Error: Unable to connect to server.\nCheck console for details.";
            }
        }
    </script>
</body>

</html>
