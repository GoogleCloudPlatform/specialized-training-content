<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presentation — Cymbal Meet Agentic Innovation</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    .shell {
      display: flex;
      height: 100vh;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 260px;
      flex-shrink: 0;
      background: #ffffff;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }

    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border-light);
    }

    .sidebar-header a {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      text-decoration: none;
    }

    .sidebar-header a:hover {
      color: var(--accent);
      text-decoration: none;
    }

    .sidebar-header a .material-symbols-outlined {
      font-size: 20px;
      color: black;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
    }

    .nav-section {
      margin-bottom: 4px;
    }

    .nav-section-label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-light);
      padding: 0 8px;
      margin-bottom: 8px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      font-size: 0.88rem;
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: background 0.15s;
      margin-bottom: 2px;
    }

    .nav-btn:hover {
      background: var(--bg);
    }

    .nav-btn.active {
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .nav-btn .material-symbols-outlined {
      font-size: 20px;
      color: var(--text-light);
      flex-shrink: 0;
    }

    .nav-btn.active .material-symbols-outlined {
      color: var(--accent);
    }

    /* ---- Main content ---- */
    .main-content {
      flex: 1;
      background: #f5f5f5;
      overflow: hidden;
    }

    .main-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Empty state shown before any page is selected */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-light);
      gap: 12px;
    }

    .empty-state .material-symbols-outlined {
      font-size: 48px;
    }
  </style>
</head>
<body>

  <div class="shell">

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-header">
        <a href="/">
          <span class="material-symbols-outlined">videocam</span>
          Cymbal Meet
        </a>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <button class="nav-btn active" data-src="/presentation/intro.html">
            <span class="material-symbols-outlined">info</span>
            Intro to Cymbal Meet
          </button>
        </div>

        <div class="nav-section">
          <button class="nav-btn" data-src="/presentation/problems.html">
            <span class="material-symbols-outlined">trending_down</span>
            Big Business Problems
          </button>
        </div>

        <div class="nav-section">
          <button class="nav-btn" data-src="/presentation/process.html">
            <span class="material-symbols-outlined">account_tree</span>
            As-Is Process
          </button>
        </div>

        <div class="nav-section">
          <button class="nav-btn" data-src="/presentation/process-r.html">
            <span class="material-symbols-outlined">auto_awesome</span>
            Reimagined Process
          </button>
        </div>

        <div class="nav-section">
          <button class="nav-btn" data-src="/presentation/design.html">
            <span class="material-symbols-outlined">precision_manufacturing</span>
            Agentic Solution Design
          </button>
        </div>
        
        <div class="nav-section">
          <button class="nav-btn" data-src="/presentation/build.html">
            <span class="material-symbols-outlined">deployed_code</span>
            Build Agents
          </button>
        </div>

        <div class="nav-section">
          <button class="nav-btn" data-src="/demo/">
            <span class="material-symbols-outlined">play_circle</span>
            Launch Demo
          </button>
        </div>

        <div class="nav-section">
          <button class="nav-btn" data-src="/presentation/takeaways-a.html">
            <span class="material-symbols-outlined">lightbulb</span>
            Takeaways
          </button>
        </div>
      </nav>
    </div>

    <!-- Main area -->
    <div class="main-content" id="main">
      <iframe id="content-frame" src="/presentation/intro.html"></iframe>
    </div>

  </div>

  <script>
    const buttons = document.querySelectorAll('.nav-btn[data-src]');
    const frame = document.getElementById('content-frame');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        // Update active state
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        // Load page in iframe
        frame.src = btn.dataset.src;
      });
    });

    // Listen for navigation inside the iframe to sync sidebar
    frame.addEventListener('load', () => {
      try {
        const loc = frame.contentWindow.location.pathname;
        buttons.forEach(btn => {
          btn.classList.toggle('active', loc.startsWith(btn.dataset.src));
        });
      } catch (e) {
        // cross-origin — ignore
      }
    });
  </script>

</body>
</html>
