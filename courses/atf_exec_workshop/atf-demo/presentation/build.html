<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cymbal Meet: Build and Deploy Agents</title>
  <link rel="stylesheet" href="/shared/styles.css">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap" />
  <style>
    body {
      background: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }

    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
      vertical-align: middle;
      font-size: 1.4rem;
    }

    .presentation {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 32px;
    }

    /* Header - matching process-r.html */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .header .logo .material-symbols-outlined {
      font-size: 2.4rem;
      color: black;
    }

    .header .logo h1 {
      margin: 0;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 400;
      margin-bottom: 10px;
      color: #1f1f1f;
    }

    .header .subtitle {
      font-size: 1.2rem;
      color: #666;
    }

    /* Outer Card */
    .outer-card {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 48px 40px;
      margin-top: 48px;
    }

    /* Horizontal Flow */
    .flow-container {
      display: flex;
      align-items: stretch;
      gap: 0;
      position: relative;
    }

    .phase {
      flex: 1;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 32px 24px;
      text-align: center;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      overflow: hidden;
    }

    /* Colored bars at top of each phase */
    .phase-1 {
      border-top: 4px solid #4285f4;
    }

    .phase-2 {
      border-top: 4px solid #34a853;
    }

    .phase-3 {
      border-top: 4px solid #fbbc04;
    }

    .phase-4 {
      border-top: 4px solid #ea4335;
    }

    .phase-5 {
      border-top: 4px solid #9c27b0;
    }

    /* Arrow connector between phases */
    .arrow-connector {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      width: 32px;
      color: #ccc;
    }

    .arrow-connector .material-symbols-outlined {
      font-size: 1.8rem;
    }

    .phase-icon {
      margin: 0 auto;
    }

    .phase-icon .material-symbols-outlined {
      font-size: 3.5rem;
    }

    /* Muted colored icons */
    .phase-1 .phase-icon .material-symbols-outlined {
      color: #7ba5f7;
    }

    .phase-2 .phase-icon .material-symbols-outlined {
      color: #6bc882;
    }

    .phase-3 .phase-icon .material-symbols-outlined {
      color: #d4a049;
    }

    .phase-4 .phase-icon .material-symbols-outlined {
      color: #f07d6f;
    }

    .phase-5 .phase-icon .material-symbols-outlined {
      color: #b965c9;
    }

    .phase-name {
      font-size: 1.15rem;
      font-weight: 500;
      color: #1f1f1f;
      margin: 0;
      line-height: 1.3;
    }

  </style>
</head>

<body>
  <div class="presentation">
    <div class="header">
      <div class="logo">
        <span class="material-symbols-outlined">deployed_code</span>
        <h1>Cymbal Meet: Build and Deploy Agents</h1>
      </div>
      <div class="subtitle">Agent Development Lifecycle</div>
    </div>

    <div class="outer-card">
      <div class="flow-container">
        <div class="phase phase-1">
          <div class="phase-icon">
            <span class="material-symbols-outlined">science</span>
          </div>
          <h2 class="phase-name">Prototype</h2>
        </div>

        <div class="arrow-connector">
          <span class="material-symbols-outlined">arrow_forward</span>
        </div>

        <div class="phase phase-2">
          <div class="phase-icon">
            <span class="material-symbols-outlined">experiment</span>
          </div>
          <h2 class="phase-name">Pilot/Validate</h2>
        </div>

        <div class="arrow-connector">
          <span class="material-symbols-outlined">arrow_forward</span>
        </div>

        <div class="phase phase-3">
          <div class="phase-icon">
            <span class="material-symbols-outlined">smart_toy</span>
          </div>
          <h2 class="phase-name">Build production agents</h2>
        </div>

        <div class="arrow-connector">
          <span class="material-symbols-outlined">arrow_forward</span>
        </div>

        <div class="phase phase-4">
          <div class="phase-icon">
            <span class="material-symbols-outlined">rocket_launch</span>
          </div>
          <h2 class="phase-name">Launch</h2>
        </div>

        <div class="arrow-connector">
          <span class="material-symbols-outlined">arrow_forward</span>
        </div>

        <div class="phase phase-5">
          <div class="phase-icon">
            <span class="material-symbols-outlined">monitoring</span>
          </div>
          <h2 class="phase-name">Ongoing operations</h2>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
